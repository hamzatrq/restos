# to later waves/modules. The Wave-0 exit gate reads this: every `in_scope` FR
# must be green in conformance/01.yml; every `deferred` FR carries a reason +
# target so it is a conscious deferral, not an oversight. (verify:01 --gate
# wiring to consume this file is a scheduled harness follow-up.)
